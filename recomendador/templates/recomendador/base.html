{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}PéDeQuê?{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'recomendador/css/style.css' %}">
</head>
<body>
    <div class="page-top">
        <header class="navbar">
            <a href="/" class="navbar-brand">
                <span>PéDeQuê?</span>
            </a>

            <nav class="navbar-center">
                <a href="/recomendar/">Recomendação</a>
                <a href="/culturas/">Culturas</a>
                <a href="/">Sobre</a>
            </nav>

            <div class="navbar-right">
                {% if user.is_authenticated and user.is_staff %}
                    <a href="/admin/" class="admin-link">Admin</a>
                {% endif %}
                <a href="/recomendar/" class="nav-cta">Começar</a>
            </div>
        </header>
    </div>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <p>PéDeQuê? — tecnologia para apoiar pequenos produtores do plantio à colheita.</p>
    </footer>
</body>
</html>
